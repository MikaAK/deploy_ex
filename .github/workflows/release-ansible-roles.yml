name: Package and Release Ansible Roles

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to attach the ansible-roles.tar.gz to'
        required: true
        type: string
      force:
        description: 'Force upload even if roles unchanged'
        required: false
        type: boolean
        default: false

jobs:
  package-ansible-roles:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          fetch-depth: 0
      
      - name: Check if Ansible roles changed
        id: check_changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Force upload requested"
            exit 0
          fi
          
          # Get the previous tag
          CURRENT_TAG="${{ github.event.release.tag_name || inputs.tag }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "^${CURRENT_TAG}$" | tail -n1)
          
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "No previous tag found, will upload roles"
            exit 0
          fi
          
          echo "Comparing $PREV_TAG to $CURRENT_TAG"
          
          # Check if any files in priv/ansible/roles or priv/ansible/group_vars changed
          if git diff --name-only "$PREV_TAG" "$CURRENT_TAG" | grep -E '^priv/ansible/(roles|group_vars)/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Ansible roles changed, will upload"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to Ansible roles, skipping upload"
          fi
      
      - name: Package Ansible roles
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd priv/ansible
          tar -czf ../../ansible-roles.tar.gz roles/ group_vars/
          cd ../..
          ls -lh ansible-roles.tar.gz
      
      - name: Get release info
        if: steps.check_changes.outputs.changed == 'true'
        id: release
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "upload_url=${{ github.event.release.upload_url }}" >> $GITHUB_OUTPUT
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            # Get release by tag for manual dispatch
            RELEASE_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ inputs.tag }}")
            UPLOAD_URL=$(echo "$RELEASE_DATA" | jq -r '.upload_url')
            echo "upload_url=$UPLOAD_URL" >> $GITHUB_OUTPUT
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload ansible-roles.tar.gz to release
        if: steps.check_changes.outputs.changed == 'true'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: ./ansible-roles.tar.gz
          asset_name: ansible-roles.tar.gz
          asset_content_type: application/gzip
      
      - name: Summary
        run: |
          if [ "${{ steps.check_changes.outputs.changed }}" = "true" ]; then
            echo "✅ Packaged and uploaded ansible-roles.tar.gz to release ${{ steps.release.outputs.tag }}"
            echo "📦 Download URL: https://github.com/${{ github.repository }}/releases/download/${{ steps.release.outputs.tag }}/ansible-roles.tar.gz"
          else
            echo "⏭️ Skipped - No changes to Ansible roles since previous release"
          fi
