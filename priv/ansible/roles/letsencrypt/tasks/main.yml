- name: letsencrypt
  block:
    - name: Compute certificate subject (domain or public IP)
      set_fact:
        letsencrypt_cert_subject: "{{ ansible_default_ipv4.address if (letsencrypt_use_public_ip | bool) else domain }}"

    # --- package install (differs by mode) ---

    - name: Install certbot + Cloudflare DNS plugin (domain mode)
      apt:
        name:
          - certbot
          - python3-certbot-dns-cloudflare
        state: present
        update_cache: yes
      when: not letsencrypt_use_public_ip | bool

    # IP certs require certbot ≥ 4.0 for `--preferred-profile shortlived`.
    # Debian/Ubuntu apt usually ships an older certbot, so install via snap.
    - name: Install snapd (IP mode)
      apt:
        name: snapd
        state: present
        update_cache: yes
      when: letsencrypt_use_public_ip | bool

    - name: Install certbot via snap (IP mode)
      command: snap install --classic certbot
      args:
        creates: /snap/bin/certbot
      when: letsencrypt_use_public_ip | bool

    - name: Symlink certbot into /usr/bin (IP mode)
      file:
        src: /snap/bin/certbot
        dest: /usr/bin/certbot
        state: link
        force: true
      when: letsencrypt_use_public_ip | bool

    # --- Cloudflare credentials (domain mode only) ---

    - name: Ensure Cloudflare API token is configured (domain mode)
      fail:
        msg: "cloudflare_api_token is required for certbot DNS challenge (Zone:DNS:Edit)."
      when:
        - not letsencrypt_use_public_ip | bool
        - cloudflare_api_token is not defined or cloudflare_api_token | length == 0

    - name: Create Cloudflare credentials file for certbot (domain mode)
      template:
        src: cloudflare-credentials.ini.j2
        dest: /etc/letsencrypt/cloudflare-credentials.ini
        mode: '0600'
        owner: root
        group: root
      when:
        - not letsencrypt_use_public_ip | bool
        - cloudflare_api_token is defined

    # --- renewal scripts + systemd units (both modes; use cert_subject) ---

    - name: Create certificate renewal script
      template:
        src: renew-certificates.sh.j2
        dest: /usr/local/bin/renew-certificates.sh
        mode: '0755'
      notify: restart certificate renewal service

    - name: Create systemd service for certificate renewal
      template:
        src: cert-renewal.service.j2
        dest: /etc/systemd/system/cert-renewal.service
        mode: '0644'
      notify:
        - reload systemd
        - enable certificate renewal service

    - name: Create systemd timer for certificate renewal
      template:
        src: cert-renewal.timer.j2
        dest: /etc/systemd/system/cert-renewal.timer
        mode: '0644'
      notify:
        - reload systemd
        - enable certificate renewal timer

    - name: Create startup script for certificate check
      template:
        src: check-certificates.sh.j2
        dest: /usr/local/bin/check-certificates.sh
        mode: '0755'

    - name: Create systemd service for initial certificate check on boot
      template:
        src: cert-initial.service.j2
        dest: /etc/systemd/system/cert-initial.service
        mode: '0644'
      notify:
        - reload systemd
        - enable certificate initial service

    - name: Add certificate check to cloud-init (if it exists)
      lineinfile:
        path: /etc/rc.local
        line: '/usr/local/bin/check-certificates.sh'
        insertbefore: '^exit 0'
        mode: '0755'
        create: yes

    - name: Run initial certificate check now
      systemd:
        name: cert-initial
        state: started

    # --- initial issuance (mode-specific challenge) ---

    - name: Ensure Let's Encrypt certificate exists (domain mode — Cloudflare DNS-01)
      shell: |
        set -euo pipefail
        certbot certonly \
          --dns-cloudflare \
          --dns-cloudflare-credentials /etc/letsencrypt/cloudflare-credentials.ini \
          -d "{{ letsencrypt_cert_subject }}" \
          --non-interactive \
          --agree-tos \
          --email "{{ letsencrypt_email }}"
      args:
        creates: "/etc/letsencrypt/live/{{ letsencrypt_cert_subject }}/fullchain.pem"
      when: not letsencrypt_use_public_ip | bool

    # IP mode: HTTP-01 standalone against port 80 with the short-lived profile.
    # Pre/post hooks briefly stop nginx so certbot can bind :80; they're stored in the
    # renewal config and auto-applied by `certbot renew` on later runs.
    - name: Ensure Let's Encrypt certificate exists (IP mode — HTTP-01 standalone, short-lived)
      shell: |
        set -euo pipefail
        certbot certonly \
          --standalone \
          --preferred-profile shortlived \
          -d "{{ letsencrypt_cert_subject }}" \
          --non-interactive \
          --agree-tos \
          --email "{{ letsencrypt_email }}" \
          --pre-hook "systemctl stop nginx 2>/dev/null || true" \
          --post-hook "systemctl start nginx 2>/dev/null || true"
      args:
        creates: "/etc/letsencrypt/live/{{ letsencrypt_cert_subject }}/fullchain.pem"
      when: letsencrypt_use_public_ip | bool

    - name: Set proper permissions for certificate files
      file:
        path: /etc/letsencrypt
        state: directory
        recurse: yes
        mode: '0755'
        owner: root
        group: root
  become: true
