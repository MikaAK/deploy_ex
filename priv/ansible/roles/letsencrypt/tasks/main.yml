- name: letsencrypt
  block:
    - name: Ensure Cloudflare API token is configured
      fail:
        msg: "cloudflare_api_token is required for certbot DNS challenge (Zone:DNS:Edit)."
      when: cloudflare_api_token is not defined or cloudflare_api_token | length == 0

    - name: Install required packages
      apt:
        name:
          - certbot
          - python3-certbot-dns-cloudflare
        state: present
        update_cache: yes

    - name: Create Cloudflare credentials file for certbot
      template:
        src: cloudflare-credentials.ini.j2
        dest: /etc/letsencrypt/cloudflare-credentials.ini
        mode: '0600'
        owner: root
        group: root
      when: cloudflare_api_token is defined

    - name: Create certificate renewal script
      template:
        src: renew-certificates.sh.j2
        dest: /usr/local/bin/renew-certificates.sh
        mode: '0755'
      notify: restart certificate renewal service

    - name: Create systemd service for certificate renewal
      template:
        src: cert-renewal.service.j2
        dest: /etc/systemd/system/cert-renewal.service
        mode: '0644'
      notify:
        - reload systemd
        - enable certificate renewal service

    - name: Create systemd timer for certificate renewal
      template:
        src: cert-renewal.timer.j2
        dest: /etc/systemd/system/cert-renewal.timer
        mode: '0644'
      notify:
        - reload systemd
        - enable certificate renewal timer

    - name: Create startup script for certificate check
      template:
        src: check-certificates.sh.j2
        dest: /usr/local/bin/check-certificates.sh
        mode: '0755'

    - name: Create systemd service for initial certificate check on boot
      template:
        src: cert-initial.service.j2
        dest: /etc/systemd/system/cert-initial.service
        mode: '0644'
      notify:
        - reload systemd
        - enable certificate initial service

    - name: Add certificate check to cloud-init (if it exists)
      lineinfile:
        path: /etc/rc.local
        line: '/usr/local/bin/check-certificates.sh'
        insertbefore: '^exit 0'
        mode: '0755'
        create: yes

    - name: Run initial certificate check now
      systemd:
        name: cert-initial
        state: started

    - name: Ensure certificates exist or generate them
      shell: |
        #!/bin/bash
        set -euo pipefail

        DOMAIN="{{ domain }}"
        EMAIL="{{ letsencrypt_email }}"
        CREDS_FILE="/etc/letsencrypt/cloudflare-credentials.ini"

        # Check if Cloudflare credentials exist
        if [ ! -f "$CREDS_FILE" ]; then
            echo "Cloudflare credentials not found at $CREDS_FILE"
            exit 1
        fi

        # Check if certificate exists and is valid for at least 7 days
        if [ -f "/etc/letsencrypt/live/$DOMAIN/fullchain.pem" ]; then
            EXPIRY=$(openssl x509 -in "/etc/letsencrypt/live/$DOMAIN/fullchain.pem" -noout -enddate | cut -d= -f2)
            EXPIRY_EPOCH=$(date -d "$EXPIRY" +%s)
            CURRENT_EPOCH=$(date +%s)
            DAYS_LEFT=$(( (EXPIRY_EPOCH - CURRENT_EPOCH) / 86400 ))

            if [ $DAYS_LEFT -gt 7 ]; then
                echo "Certificate is valid for $DAYS_LEFT days. No renewal needed."
                exit 0
            fi
        fi

        # Obtain or renew certificate using DNS challenge
        echo "Obtaining/renewing certificate for $DOMAIN using DNS challenge..."
        certbot certonly \
            --dns-cloudflare \
            --dns-cloudflare-credentials "$CREDS_FILE" \
            -d "$DOMAIN" \
            --non-interactive \
            --agree-tos \
            --email "$EMAIL" \
            --force-renewal

        echo "Certificate obtained/renewed successfully"
        /usr/local/bin/check-certificates.sh
      args:
        creates: "/etc/letsencrypt/live/{{ domain }}/fullchain.pem"

    - name: Set proper permissions for certificate files
      file:
        path: /etc/letsencrypt
        state: directory
        recurse: yes
        mode: '0755'
        owner: root
        group: root
  when: not letsencrypt_use_public_ip | bool
  become: true

# IP-cert path — used by standalone QA nodes (set via --public-ip-cert on qa.create).
# Gets a real Let's Encrypt cert scoped to the node's public IPv4 using the short-lived
# profile (~7-day cert lifetime). Requires certbot ≥ 4.0, installed via snap since
# Debian/Ubuntu apt packages are too old.
- name: letsencrypt (Let's Encrypt HTTP-01 for public IP — standalone QA nodes)
  block:
    - name: Install snapd
      apt:
        name: snapd
        state: present
        update_cache: yes

    - name: Install certbot via snap (needs ≥ 4.0 for --preferred-profile shortlived)
      command: snap install --classic certbot
      args:
        creates: /snap/bin/certbot

    - name: Symlink certbot into /usr/bin
      file:
        src: /snap/bin/certbot
        dest: /usr/bin/certbot
        state: link
        force: true

    # ansible_default_ipv4 reflects the EC2 primary NIC (private 10.x); LE won't
    # issue against that. Pull the public IPv4 from IMDSv2 instead. Token TTL is
    # the call-site lifetime — long enough for the cert request, short enough to
    # not linger.
    - name: Get IMDSv2 token
      uri:
        url: http://169.254.169.254/latest/api/token
        method: PUT
        headers:
          X-aws-ec2-metadata-token-ttl-seconds: "300"
        return_content: true
      register: imds_token

    - name: Read public IPv4 from EC2 instance metadata
      uri:
        url: http://169.254.169.254/latest/meta-data/public-ipv4
        headers:
          X-aws-ec2-metadata-token: "{{ imds_token.content }}"
        return_content: true
      register: imds_public_ipv4

    - name: Bind qa_public_ip to the IMDSv2 result
      set_fact:
        qa_public_ip: "{{ imds_public_ipv4.content }}"

    # certbot's -d flag goes through DNSName() which rejects IPs client-side
    # ("will not issue certificates for a bare IP address") even though LE's
    # shortlived profile DOES support IPs. --ip-address is the correct flag for
    # IP SANs and bypasses the DNS sanity check.
    #
    # --required-profile (vs --preferred-profile) forces the request to fail if
    # the CA can't honor shortlived, which is the only profile that issues for
    # IPs today.
    #
    # --pre-hook / --post-hook stop + start nginx around issuance so certbot can
    # bind :80. They get persisted in the cert's renewal config, so snap's
    # built-in snap.certbot.renew.timer handles nginx cycling on its own during
    # renewals.
    - name: Obtain Let's Encrypt short-lived cert for public IP
      shell: |
        set -euo pipefail
        certbot certonly \
          --standalone \
          --required-profile shortlived \
          --ip-address "{{ qa_public_ip }}" \
          --non-interactive \
          --agree-tos \
          --email "{{ letsencrypt_email }}" \
          --pre-hook "systemctl stop nginx 2>/dev/null || true" \
          --post-hook "systemctl start nginx 2>/dev/null || true"
      args:
        creates: "/etc/letsencrypt/live/{{ qa_public_ip }}/fullchain.pem"

    - name: Set proper permissions for certificate files
      file:
        path: /etc/letsencrypt
        state: directory
        recurse: yes
        mode: '0755'
        owner: root
        group: root
  when: letsencrypt_use_public_ip | bool
  become: true
