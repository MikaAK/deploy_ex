- name: beam_linux_tuning
  block:
    - name: Gather active swap devices
      command: swapon --show=NAME --noheadings
      register: active_swap
      changed_when: false

    - name: Disable all active swap
      command: swapoff -a
      when: active_swap.stdout != ''

    - name: Remove swap entries from /etc/fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '# \1'

    - name: Remove common swapfile paths
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /swapfile
        - /swap.img
        - /var/swap

    - name: Copy limits.conf file to /etc/security/limits.conf
      copy:
        src: limits.conf
        dest: /etc/security/limits.conf
        owner: root
        group: root
        mode: 0644
      register: limits_conf_file

    - name: Copy sysctl.conf file to /etc/sysctl.conf
      copy:
        src: sysctl.conf
        dest: /etc/sysctl.conf
        owner: root
        group: root
        mode: 0644
      register: sysctl_conf_file

    - name: Copy rc.local file to /etc/rc.local
      copy:
        src: rc.local
        dest: /etc/rc.local
        owner: root
        group: root
        mode: 0644
      register: rc_local_file

    - name: Apply sysctl configuration
      command: sysctl -p
      when: sysctl_conf_file.changed

    - name: Increase TCP Congestion Window
      shell: defrt=`ip route | grep "^default" | head -1` && ip route change $defrt initcwnd 10
      when: rc_local_file.changed
  become: true
