---
# ThetaData Terminal role defaults.
#
# Override THETA_USERNAME / THETA_PASSWORD via group_vars or the playbook's
# environment block (e.g. injected from 1Password through the CI deploy
# pipeline). Never commit credentials.
thetadata_terminal_user: theta
thetadata_terminal_group: theta
thetadata_terminal_home: /opt/theta
thetadata_terminal_jar_url: "https://download-stable.thetadata.us/ThetaTerminal.jar"
thetadata_terminal_java_opts: "-Xms2G -Xmx6G"
thetadata_terminal_tz: "UTC"

# JDK package — openjdk-21-jre-headless is the current LTS on Debian 13.
thetadata_terminal_jdk_package: openjdk-21-jre-headless

# These must be supplied at runtime via environment / vault / group_vars.
# Defaults are deliberately empty so a misconfigured deploy fails loudly.
thetadata_terminal_username: ""
thetadata_terminal_password: ""
