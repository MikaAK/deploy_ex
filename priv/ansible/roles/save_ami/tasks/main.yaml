- name: save_ami
  block:
    - name: Get instance metadata
      uri:
        url: http://169.254.169.254/latest/meta-data/instance-id
        return_content: yes
      register: instance_id_result

    - name: Get AWS region
      uri:
        url: http://169.254.169.254/latest/meta-data/placement/region
        return_content: yes
      register: region_result

    - name: Set instance and region facts
      set_fact:
        instance_id: "{{ instance_id_result.content }}"
        aws_region: "{{ region_result.content }}"

    # Strip the running app from the snapshot so AMI is a pure base layer.
    # Without this, the AMI carries the currently-installed release at
    # /srv/{{ app_name }} AND the systemd unit stays enabled — every new
    # ASG instance boots, systemd auto-starts the OLD baked release, and
    # serves traffic for ~30s until cloud-init downloads + swaps to the
    # latest. Cross-app RPCs in that window send stale-shape structs and
    # blow up on receivers running newer code (function_clause on missing
    # struct keys, etc.). Stripping forces cloud-init to be the only
    # install path; systemd has nothing to start until the new release
    # is in place.
    - name: Stop app service before AMI snapshot
      systemd:
        name: "{{ app_name }}"
        state: stopped
      ignore_errors: yes

    - name: Disable app service before AMI snapshot
      systemd:
        name: "{{ app_name }}"
        enabled: no
      ignore_errors: yes

    - name: Remove systemd unit file before AMI snapshot
      file:
        path: "/etc/systemd/system/{{ app_name }}.service"
        state: absent

    - name: Reload systemd after unit removal
      command: systemctl daemon-reload

    - name: Remove installed release before AMI snapshot
      file:
        path: "/srv/{{ app_name }}"
        state: absent

    - name: Remove current_release.txt marker before AMI snapshot
      file:
        path: /srv/current_release.txt
        state: absent

    - name: Clean cloud-init state so it re-runs on new instances
      command: cloud-init clean --logs

    - name: Create AMI from current instance
      command: >
        aws ec2 create-image
        --region {{ aws_region }}
        --instance-id {{ instance_id }}
        --name "{{ app_name }}-{{ env }}-{{ ansible_date_time.epoch }}"
        --description "Auto-generated AMI for {{ app_name }} in {{ env }} at {{ ansible_date_time.iso8601 }}"
        --tag-specifications 'ResourceType=image,Tags=[
          {Key=Name,Value={{ app_name }}-{{ env }}},
          {Key=App,Value={{ app_name }}},
          {Key=Environment,Value={{ env }}},
          {Key=CreatedAt,Value={{ ansible_date_time.iso8601 }}},
          {Key=ManagedBy,Value=DeployEx},
          {Key=Type,Value=AutoScaleReady}
        ]'
        --no-reboot
      register: ami_creation_result

    - name: Parse AMI ID from result
      set_fact:
        new_ami_id: "{{ (ami_creation_result.stdout | from_json).ImageId }}"

    - name: Store AMI ID in SSM Parameter Store
      command: >
        aws ssm put-parameter
        --region {{ aws_region }}
        --name "/deploy_ex/{{ env }}/{{ app_name }}/latest_ami"
        --value "{{ new_ami_id }}"
        --type String
        --overwrite
        --description "Latest AMI for {{ app_name }} in {{ env }}"

    - name: Wait for AMI to be available (async, non-blocking)
      command: >
        aws ec2 wait image-available
        --region {{ aws_region }}
        --image-ids {{ new_ami_id }}
      async: 1800
      poll: 0
      register: ami_wait_task

    - name: Log AMI creation success
      debug:
        msg: "Created AMI {{ new_ami_id }} for {{ app_name }}-{{ env }}. AMI will be available in ~5-10 minutes."

    - name: Cleanup old AMIs (keep last 3)
      shell: |
        aws ec2 describe-images \
          --region {{ aws_region }} \
          --owners self \
          --filters "Name=tag:App,Values={{ app_name }}" "Name=tag:Environment,Values={{ env }}" "Name=tag:ManagedBy,Values=DeployEx" \
          --query 'Images | sort_by(@, &CreationDate) | [:-3].[ImageId]' \
          --output text | while read ami_id; do
            if [ -n "$ami_id" ]; then
              echo "Deregistering old AMI: $ami_id"
              aws ec2 deregister-image --region {{ aws_region }} --image-id $ami_id || true
            fi
          done
      register: cleanup_result
      ignore_errors: yes

    - name: Log cleanup result
      debug:
        msg: "{{ cleanup_result.stdout_lines }}"
      when: cleanup_result.stdout_lines | length > 0

  become: true
